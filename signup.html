<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Nomadic Performance</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <div class="logo"><img src="Media/logo1.png" alt="Nomadic Performance Logo"/><h1>Nomadic Performance</h1></div>
    <nav>
      <a href="index.html">Home</a><a href="about.html">About Us</a><a href="services.html">Services</a>
      <a href="programs.html">Programs</a><a href="blog.html">Blog</a><a href="free-programs.html">Free Programs</a><a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="hero hero--compact">
    <h2>Create your account</h2>
    <p>Access your dashboard, programs, and progress.</p>
  </section>

  <main class="auth-wrapper">
    <section class="auth-card">
      <h3>Sign Up</h3>
      <form id="signupForm" novalidate>
        <div class="form-row">
          <label for="name">Name (optional)</label>
          <input id="name" name="name" type="text" placeholder="Alex Rider" autocomplete="name"/>
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <div class="password-field">
            <input id="password" name="password" type="password" placeholder="••••••••" required minlength="6" autocomplete="new-password"/>
            <button class="toggle-password" type="button">Show</button>
          </div>
        </div>

        <button type="submit" class="cta-button cta-button--full">Create Account</button>
        <p class="form-footnote">Already have an account? <a href="login.html">Log in</a></p>
        <div id="formMessage" class="form-message" role="alert" aria-live="polite" hidden></div>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2025 Nomadic Performance | Live Free, Thrive Wild</p>
    <div class="social-media">
      <a href="https://www.instagram.com/nomadicperformanceco/" target="_blank" rel="noopener">
        <img src="Media/instagram-icon.png" class="social-icon" alt="Instagram"/>
      </a>
      <a href="https://x.com/nomadperformco?s=21" target="_blank" rel="noopener">
        <img src="Media/x-icon.png" class="social-icon" alt="Twitter"/>
      </a>
    </div>
  </footer>

  <script src="js/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // layout fix
    document.addEventListener("DOMContentLoaded", () => {
      const header = document.querySelector("header");
      const hero = document.querySelector(".hero");
      hero.style.paddingTop = header.offsetHeight + "px";
    });
    // show/hide pw
    (function(){ const b=document.querySelector(".toggle-password"), i=document.getElementById("password");
      if(b&&i){ b.addEventListener("click",()=>{const h=i.type==="password"; i.type=h?"text":"password"; b.textContent=h?"Hide":"Show";}); }})();

    // Supabase client (persist in localStorage so signup flows to dashboard after confirm)
    const supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storage: window.localStorage }
    });

    const form = document.getElementById("signupForm");
    const msg  = document.getElementById("formMessage");
    const show = (t,type="error") => { msg.textContent=t; msg.hidden=false; msg.className="form-message "+type; };

    form.addEventListener("submit", async (e) => {
      e.preventDefault(); msg.hidden = true;
      const name  = form.name.value.trim();
      const email = form.email.value.trim();
      const pass  = form.password.value;

      if(!/^\S+@\S+\.\S+$/.test(email)) return show("Please enter a valid email.");
      if(pass.length < 6) return show("Password must be at least 6 characters.");

      const { data, error } = await supabaseClient.auth.signUp({
        email, password: pass,
        options: {
          data: { full_name: name || null },
          emailRedirectTo: window.location.origin + "/reset-password.html" // works for magic-link or recovery flows
        }
      });

      if (error) return show(error.message || "Sign up failed.");
      // If email confirmations are ON, they must confirm before sign-in
      show("Check your email to confirm your account.", "success");
    });
  </script>
</body>
</html>
