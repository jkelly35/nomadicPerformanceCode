<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Set New Password - Nomadic Performance</title>
<link rel="stylesheet" href="style.css"/></head>
<body>
<header>…same header…</header>
<section class="hero hero--compact"><h2>Set your new password</h2></section>
<main class="auth-wrapper"><section class="auth-card">
  <form id="rpForm" novalidate>
    <div class="form-row"><label for="password">New Password</label>
      <div class="password-field">
        <input id="password" type="password" required minlength="6" placeholder="••••••••"/>
        <button class="toggle-password" type="button">Show</button>
      </div>
    </div>
    <button class="cta-button cta-button--full">Update Password</button>
    <div id="msg" class="form-message" hidden></div>
  </form>
</section></main>
<footer>…same footer…</footer>

<script src="js/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, { auth:{ persistSession:true }});
  const msg = document.getElementById('msg'); const show=(t,type="error")=>{msg.textContent=t; msg.hidden=false; msg.className="form-message "+type;};

  // Show/hide pw
  (function(){ const b=document.querySelector(".toggle-password"), i=document.getElementById("password");
    if(b&&i){ b.addEventListener("click",()=>{const h=i.type==="password"; i.type=h?"text":"password"; b.textContent=h?"Hide":"Show";}); }})();

  // If user came from the email link, session will be present; then update password
  document.getElementById('rpForm').addEventListener('submit', async (e)=>{
    e.preventDefault(); msg.hidden=true;
    const pw = document.getElementById('password').value;
    if(pw.length<6) return show("Password must be at least 6 characters.");
    const { data: { session } } = await sb.auth.getSession();
    if(!session) return show("Recovery link invalid or expired. Request a new one on the Forgot Password page.");
    const { error } = await sb.auth.updateUser({ password: pw });
    if (error) return show(error.message || "Unable to update password.");
    show("Password updated. Redirecting to dashboard…", "success");
    setTimeout(()=>window.location.href="dashboard.html", 600);
  });
</script>
</body></html>
