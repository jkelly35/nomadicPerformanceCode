<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password - Nomadic Performance</title>
<link rel="stylesheet" href="style.css"/></head>
<body>
<header>…same header…</header>
<section class="hero hero--compact"><h2>Reset your password</h2><p>We’ll email you a reset link.</p></section>
<main class="auth-wrapper"><section class="auth-card">
  <form id="fpForm" novalidate>
    <div class="form-row"><label for="email">Email</label>
      <input id="email" type="email" required placeholder="you@example.com"/></div>
    <button class="cta-button cta-button--full">Send Reset Link</button>
    <div id="msg" class="form-message" hidden></div>
  </form>
</section></main>
<footer>…same footer…</footer>

<script src="js/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  const form = document.getElementById('fpForm'); const msg = document.getElementById('msg');
  const show = (t,type="error")=>{msg.textContent=t; msg.hidden=false; msg.className="form-message "+type;};

  form.addEventListener('submit', async (e)=>{
    e.preventDefault(); msg.hidden=true;
    const email = document.getElementById('email').value.trim();
    if(!/^\S+@\S+\.\S+$/.test(email)) return show("Enter a valid email.");
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + "/reset-password.html"
    });
    if (error) return show(error.message || "Could not send reset link.");
    show("Check your email for a reset link.", "success");
  });
</script>
</body></html>
